<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vizual Ninja Studios — Gallery Room 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0a0a0a; font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }

    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.7);
      padding: 10px 22px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.08em;
      pointer-events: none;
      transition: opacity 0.8s ease;
      border: 1px solid rgba(255,255,255,0.08);
    }
    #hint.fade { opacity: 0; }

    #brand {
      position: fixed;
      top: 22px;
      left: 24px;
      z-index: 10;
      color: rgba(255,255,255,0.6);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* ===================== CHAT PANEL ===================== */
    #chat-panel {
      position: fixed; top: 0; right: 0; z-index: 20;
      width: 380px; max-width: 92vw; height: 100%;
      background: #fafaf8;
      box-shadow: -12px 0 48px rgba(0, 0, 0, 0.5);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.42s cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    #chat-panel.open { transform: translateX(0); }

    #chat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px; background: #111; color: #fff;
    }
    .chat-name { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 400; letter-spacing: 0.04em; }
    .chat-sub { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #888; margin-top: 3px; }
    #chat-close { background: none; border: none; color: #999; font-size: 24px; line-height: 1; cursor: pointer; padding: 0 4px; }
    #chat-close:hover { color: #fff; }

    #chat-messages { flex: 1; overflow-y: auto; padding: 18px 16px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 84%; padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.55; white-space: pre-wrap; word-wrap: break-word; font-family: 'Inter', sans-serif; }
    .msg.assistant { align-self: flex-start; background: #f0eeea; color: #1f1f1f; border-bottom-left-radius: 4px; }
    .msg.user { align-self: flex-end; background: #1a1a1a; color: #e8e4dc; border-bottom-right-radius: 4px; }
    .msg.error { align-self: flex-start; background: #f6dede; color: #7a2020; border-bottom-left-radius: 4px; }

    #chat-typing { padding: 0 20px 6px; font-size: 11px; font-style: italic; color: #8a8a8a; display: none; }
    #chat-typing.show { display: block; }

    #chat-form { display: flex; gap: 8px; padding: 14px 16px; border-top: 1px solid #e8e6e0; background: #fff; }
    #chat-input { flex: 1; border: 1px solid #ddd; border-radius: 999px; padding: 10px 16px; font-size: 13px; font-family: 'Inter', sans-serif; outline: none; }
    #chat-input:focus { border-color: #1a1a1a; }
    #chat-send { background: #1a1a1a; color: #e8e4dc; border: none; border-radius: 999px; padding: 0 18px; font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer; }
    #chat-send:hover { background: #333; }
    #chat-send:disabled { opacity: 0.4; cursor: default; }

    /* ===================== ENTRY SCREEN ===================== */
    #entry-screen {
      position: fixed; inset: 0; z-index: 40;
      background: radial-gradient(ellipse at 50% 35%, #1a1a1c 0%, #080808 75%);
      color: #d8d2c6;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      animation: entryFadeIn 1.8s ease-out 0.2s forwards;
      transition: opacity 1.4s ease;
    }
    #entry-screen.fade-out { opacity: 0 !important; pointer-events: none; animation: none; }
    @keyframes entryFadeIn { from { opacity: 0; } to { opacity: 1; } }

    .entry-content {
      text-align: center; padding: 0 32px;
      animation: entryRise 2s cubic-bezier(0.22, 0.61, 0.36, 1) 0.3s both;
    }
    @keyframes entryRise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    .entry-eyebrow {
      font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 300;
      letter-spacing: 0.55em; color: #807a6e; text-transform: uppercase;
      margin-bottom: 34px; padding-left: 0.5em;
    }
    .entry-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(34px, 5.8vw, 62px); font-weight: 300;
      letter-spacing: 0.2em; margin: 0; line-height: 1.08;
      color: #ece8df; padding-left: 0.2em;
    }
    .entry-rule { width: 48px; height: 1px; background: #6a6354; margin: 42px auto 46px; }
    #enter-btn {
      font-family: 'Inter', sans-serif; background: transparent;
      border: 1px solid rgba(185, 168, 132, 0.4); color: #c8c0b2;
      padding: 14px 42px; font-size: 10px; font-weight: 300;
      letter-spacing: 0.38em; text-transform: uppercase; cursor: pointer;
      transition: all 0.4s ease;
    }
    #enter-btn:hover { background: rgba(185, 168, 132, 0.12); color: #ece8df; border-color: rgba(185, 168, 132, 0.7); }

    /* ===================== MUTE BUTTON ===================== */
    #mute-btn {
      position: fixed; top: 20px; right: 20px; z-index: 15;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.5);
      cursor: pointer; display: none; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.8s ease, background 0.2s ease; padding: 0;
    }
    #mute-btn.visible { display: flex; opacity: 1; }
    #mute-btn:hover { background: rgba(0, 0, 0, 0.6); color: rgba(255,255,255,0.8); }
    #mute-btn svg { width: 16px; height: 16px; display: block; }
    #mute-btn .icon-muted { display: none; }
    #mute-btn.muted .icon-on { display: none; }
    #mute-btn.muted .icon-muted { display: block; }
  </style>
</head>
<body>
  <div id="brand">Vizual Ninja Studios</div>
  <div id="hint">WASD to walk &nbsp;·&nbsp; drag to look &nbsp;·&nbsp; click painting to chat &nbsp;·&nbsp; double-click floor to glide</div>

  <div id="chat-panel" aria-hidden="true">
    <div id="chat-header">
      <div>
        <div class="chat-name" id="chat-name">Tara McIlroy</div>
        <div class="chat-sub" id="chat-subtitle">Artist</div>
      </div>
      <button id="chat-close" aria-label="Close chat">&times;</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-typing">Typing&hellip;</div>
    <form id="chat-form">
      <input id="chat-input" type="text" placeholder="Ask about this work&hellip;" autocomplete="off" />
      <button id="chat-send" type="submit">Send</button>
    </form>
  </div>

  <audio id="ambient-audio" src="ambient.mp3" loop preload="auto"></audio>

  <div id="entry-screen">
    <div class="entry-content">
      <div class="entry-eyebrow">Current Exhibition</div>
      <h1 class="entry-title">VIZUAL&nbsp;NINJA<br>STUDIOS</h1>
      <div class="entry-rule"></div>
      <button id="enter-btn" type="button">Enter Gallery</button>
    </div>
  </div>

  <button id="mute-btn" aria-label="Toggle music" type="button">
    <svg class="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"></path>
    </svg>
    <svg class="icon-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
      <line x1="23" y1="9" x2="17" y2="15"></line>
      <line x1="17" y1="9" x2="23" y2="15"></line>
    </svg>
  </button>

  <a-scene background="color: #1a1916" renderer="colorManagement: true; antialias: true" cursor="rayOrigin: mouse" raycaster="objects: .clickable">

    <a-assets timeout="800">
      <img id="painting"       src="painting.jpg"         crossorigin="anonymous" />
      <img id="tara-art2"      src="Tara_Art2.jpg"        crossorigin="anonymous" />
      <img id="tara-art3"      src="Tara_Art3.jpg"        crossorigin="anonymous" />
      <img id="steph-art1"     src="Steph_Art1.jpg"       crossorigin="anonymous" />
      <img id="steph-art2"     src="Steph_Art2.JPEG"      crossorigin="anonymous" />
      <img id="steph-art3"     src="Steph_Art3.JPEG"      crossorigin="anonymous" />
      <img id="img-venice"     src="Venice_web.jpg"       crossorigin="anonymous" />
      <img id="img-kerry"      src="Kerry_web.jpg"        crossorigin="anonymous" />
      <img id="img-ringofkerry" src="RingofKerry_web.jpg" crossorigin="anonymous" />
      <img id="img-positano"   src="Positano_web.jpg"     crossorigin="anonymous" />
      <img id="img-roma"       src="TreviFountain_web.jpg" crossorigin="anonymous" />
      <img id="intertwined"    src="Intertwined.jpg"       crossorigin="anonymous" />
      <img id="dia"            src="DiaDeLosMuertos.jpeg"   crossorigin="anonymous" />
      <img id="unapologetic"   src="Unapologetic.jpg"       crossorigin="anonymous" />
    </a-assets>

    <!-- ===================== LIGHTING ===================== -->
    <!-- Warm ambient fill — bright enough to read the white walls -->
    <a-entity light="type: ambient; color: #fff8f0; intensity: 0.65"></a-entity>

    <!-- Soft overhead fill -->
    <a-entity light="type: directional; color: #fff5e8; intensity: 0.5" position="2 7 3"></a-entity>
    <a-entity light="type: point; color: #fff5e8; intensity: 0.5; distance: 30; decay: 2" position="0 6 0"></a-entity>
    <a-entity light="type: point; color: #fff5e8; intensity: 0.3; distance: 24; decay: 2" position="-6 5 0"></a-entity>
    <a-entity light="type: point; color: #fff5e8; intensity: 0.3; distance: 24; decay: 2" position="6 5 0"></a-entity>

    <!-- ===================== ROOM SHELL ===================== -->
    <!-- 24 wide × 7 tall × 16 deep -->

    <!-- Polished light concrete floor -->
    <a-plane id="floor" class="clickable" procedural-concrete
             rotation="-90 0 0" position="0 0 0"
             width="24" height="16"
             material="roughness: 0.13; metalness: 0.45; reflectivity: 0.7"></a-plane>

    <!-- Reflected light pools — faint warm highlights under the track cans, fake the wet-look sheen -->
    <a-entity id="floor-reflections">
      <a-plane rotation="-90 0 0" position="-5 0.004 -2.5" width="3.2" height="8"
               material="shader: flat; color: #fff3df; transparent: true; opacity: 0.05; blending: additive; side: double"></a-plane>
      <a-plane rotation="-90 0 0" position="0 0.004 -2.5"  width="3.2" height="8"
               material="shader: flat; color: #fff3df; transparent: true; opacity: 0.06; blending: additive; side: double"></a-plane>
      <a-plane rotation="-90 0 0" position="5 0.004 -2.5"  width="3.2" height="8"
               material="shader: flat; color: #fff3df; transparent: true; opacity: 0.05; blending: additive; side: double"></a-plane>
      <a-plane rotation="-90 0 0" position="-9.5 0.004 0"  width="2.2" height="11"
               material="shader: flat; color: #fff1da; transparent: true; opacity: 0.045; blending: additive; side: double"></a-plane>
      <a-plane rotation="-90 0 0" position="9.5 0.004 0"   width="2.2" height="11"
               material="shader: flat; color: #fff1da; transparent: true; opacity: 0.045; blending: additive; side: double"></a-plane>
      <a-plane rotation="-90 0 0" position="0 0.004 5"     width="3.2" height="6"
               material="shader: flat; color: #fff3df; transparent: true; opacity: 0.045; blending: additive; side: double"></a-plane>
    </a-entity>

    <!-- Navigation pin -->
    <a-ring id="nav-pin" radius-inner="0.18" radius-outer="0.3"
            rotation="-90 0 0" position="0 -10 0"
            material="color: #c8a96e; shader: flat; transparent: true; opacity: 0; side: double"></a-ring>

    <!-- Ceiling — warm off-white -->
    <a-plane rotation="90 0 0" position="0 7 0" width="24" height="16"
             material="color: #f0ede8; roughness: 0.85; metalness: 0"></a-plane>

    <!-- Exposed ceiling beams — dark steel I-beams -->
    <a-box position="-6 6.8 0"  width="0.18" height="0.32" depth="16" material="color: #2a2a2a; roughness: 0.4; metalness: 0.6"></a-box>
    <a-box position="0 6.8 0"   width="0.18" height="0.32" depth="16" material="color: #2a2a2a; roughness: 0.4; metalness: 0.6"></a-box>
    <a-box position="6 6.8 0"   width="0.18" height="0.32" depth="16" material="color: #2a2a2a; roughness: 0.4; metalness: 0.6"></a-box>
    <!-- I-beam flanges -->
    <a-box position="-6 6.95 0" width="0.46" height="0.035" depth="16" material="color: #252525; roughness: 0.35; metalness: 0.65"></a-box>
    <a-box position="-6 6.64 0" width="0.46" height="0.035" depth="16" material="color: #252525; roughness: 0.35; metalness: 0.65"></a-box>
    <a-box position="0 6.95 0"  width="0.46" height="0.035" depth="16" material="color: #252525; roughness: 0.35; metalness: 0.65"></a-box>
    <a-box position="0 6.64 0"  width="0.46" height="0.035" depth="16" material="color: #252525; roughness: 0.35; metalness: 0.65"></a-box>
    <a-box position="6 6.95 0"  width="0.46" height="0.035" depth="16" material="color: #252525; roughness: 0.35; metalness: 0.65"></a-box>
    <a-box position="6 6.64 0"  width="0.46" height="0.035" depth="16" material="color: #252525; roughness: 0.35; metalness: 0.65"></a-box>

    <!-- Walls — bright white -->
    <a-plane position="0 3.5 -8" width="24" height="7"
             material="color: #f5f3f0; roughness: 0.92; metalness: 0"></a-plane>
    <a-plane rotation="0 180 0" position="0 3.5 8" width="24" height="7"
             material="color: #f5f3f0; roughness: 0.92; metalness: 0"></a-plane>
    <a-plane rotation="0 90 0" position="-12 3.5 0" width="16" height="7"
             material="color: #f2f0ec; roughness: 0.92; metalness: 0"></a-plane>
    <a-plane rotation="0 -90 0" position="12 3.5 0" width="16" height="7"
             material="color: #f2f0ec; roughness: 0.92; metalness: 0"></a-plane>

    <!-- Shadow gap at floor-wall junction -->
    <a-box position="0 0.015 -7.97"  width="24"  height="0.03" depth="0.04" material="color: #1a1a1a; roughness: 1"></a-box>
    <a-box position="0 0.015 7.97"   width="24"  height="0.03" depth="0.04" material="color: #1a1a1a; roughness: 1"></a-box>
    <a-box position="-11.97 0.015 0" width="0.04" height="0.03" depth="16"  material="color: #1a1a1a; roughness: 1"></a-box>
    <a-box position="11.97 0.015 0"  width="0.04" height="0.03" depth="16"  material="color: #1a1a1a; roughness: 1"></a-box>

    <!-- ===================== TRACK LIGHTING FIXTURES ===================== -->
    <!-- Track rails -->
    <a-box position="0 6.56 -6.8"  width="20" height="0.04" depth="0.08" material="color: #1a1a1a; roughness: 0.3; metalness: 0.7"></a-box>
    <a-box position="-10.5 6.56 0" width="0.08" height="0.04" depth="14" material="color: #1a1a1a; roughness: 0.3; metalness: 0.7"></a-box>
    <a-box position="10.5 6.56 0"  width="0.08" height="0.04" depth="14" material="color: #1a1a1a; roughness: 0.3; metalness: 0.7"></a-box>

    <!-- Light cans — far wall -->
    <a-cylinder position="-5 6.35 -6.8" radius="0.06" height="0.2" material="color: #111; roughness: 0.3; metalness: 0.6"></a-cylinder>
    <a-cylinder position="0 6.35 -6.8"  radius="0.06" height="0.2" material="color: #111; roughness: 0.3; metalness: 0.6"></a-cylinder>
    <a-cylinder position="5 6.35 -6.8"  radius="0.06" height="0.2" material="color: #111; roughness: 0.3; metalness: 0.6"></a-cylinder>

    <!-- Light cans — left wall -->
    <a-cylinder position="-10.5 6.35 -4"   radius="0.06" height="0.2" material="color: #111; roughness: 0.3; metalness: 0.6"></a-cylinder>
    <a-cylinder position="-10.5 6.35 -1.5" radius="0.06" height="0.2" material="color: #111; roughness: 0.3; metalness: 0.6"></a-cylinder>
    <a-cylinder position="-10.5 6.35 1"    radius="0.06" height="0.2" material="color: #111; roughness: 0.3; metalness: 0.6"></a-cylinder>
    <a-cylinder position="-10.5 6.35 3.5"  radius="0.06" height="0.2" material="color: #111; roughness: 0.3; metalness: 0.6"></a-cylinder>
    <a-cylinder position="-10.5 6.35 6"    radius="0.06" height="0.2" material="color: #111; roughness: 0.3; metalness: 0.6"></a-cylinder>

    <!-- Light cans — right wall -->
    <a-cylinder position="10.5 6.35 -3.5" radius="0.06" height="0.2" material="color: #111; roughness: 0.3; metalness: 0.6"></a-cylinder>
    <a-cylinder position="10.5 6.35 0"    radius="0.06" height="0.2" material="color: #111; roughness: 0.3; metalness: 0.6"></a-cylinder>
    <a-cylinder position="10.5 6.35 3.5"  radius="0.06" height="0.2" material="color: #111; roughness: 0.3; metalness: 0.6"></a-cylinder>

    <!-- ===================== SPOTLIGHTS — FAR WALL (Tara) ===================== -->
    <a-entity light="type: spot; color: #fff0d4; intensity: 3.0; angle: 28; penumbra: 0.45; distance: 14; decay: 1.4"
              position="-5 6.2 -6.8" rotation="-12 0 0"></a-entity>
    <a-entity light="type: spot; color: #fff0d4; intensity: 3.2; angle: 30; penumbra: 0.45; distance: 14; decay: 1.4"
              position="0 6.2 -6.8" rotation="-12 0 0"></a-entity>
    <a-entity light="type: spot; color: #fff0d4; intensity: 3.0; angle: 28; penumbra: 0.45; distance: 14; decay: 1.4"
              position="5 6.2 -6.8" rotation="-12 0 0"></a-entity>

    <!-- ===================== SPOTLIGHTS — LEFT WALL (European Series) ===================== -->
    <a-entity light="type: spot; color: #fff2dc; intensity: 2.2; angle: 22; penumbra: 0.5; distance: 10; decay: 1.5"
              position="-10.5 6.2 -4" rotation="0 0 12"></a-entity>
    <a-entity light="type: spot; color: #fff2dc; intensity: 2.2; angle: 22; penumbra: 0.5; distance: 10; decay: 1.5"
              position="-10.5 6.2 -1.5" rotation="0 0 12"></a-entity>
    <a-entity light="type: spot; color: #fff2dc; intensity: 2.4; angle: 24; penumbra: 0.5; distance: 10; decay: 1.5"
              position="-10.5 6.2 1" rotation="0 0 12"></a-entity>
    <a-entity light="type: spot; color: #fff2dc; intensity: 2.2; angle: 22; penumbra: 0.5; distance: 10; decay: 1.5"
              position="-10.5 6.2 3.5" rotation="0 0 12"></a-entity>
    <a-entity light="type: spot; color: #fff2dc; intensity: 2.2; angle: 22; penumbra: 0.5; distance: 10; decay: 1.5"
              position="-10.5 6.2 6" rotation="0 0 12"></a-entity>

    <!-- ===================== SPOTLIGHTS — RIGHT WALL (Steph) ===================== -->
    <a-entity light="type: spot; color: #fff0d4; intensity: 2.8; angle: 26; penumbra: 0.45; distance: 12; decay: 1.5"
              position="10.5 6.2 -3.5" rotation="0 0 -12"></a-entity>
    <a-entity light="type: spot; color: #fff0d4; intensity: 2.8; angle: 26; penumbra: 0.45; distance: 12; decay: 1.5"
              position="10.5 6.2 0" rotation="0 0 -12"></a-entity>
    <a-entity light="type: spot; color: #fff0d4; intensity: 2.8; angle: 26; penumbra: 0.45; distance: 12; decay: 1.5"
              position="10.5 6.2 3.5" rotation="0 0 -12"></a-entity>

    <!-- ===================== TARA'S WALL — far wall (z = -8) ===================== -->
    <!-- Butterfly (painting.jpg): 704×1251 not available locally to measure, treating as 2×2 square (4'×4') -->
    <!-- Tara_Art2: 704×1251 → portrait ~0.563:1 → at height 2.6 → width ~1.46 -->
    <!-- Tara_Art3: 704×746 → nearly square ~0.944:1 → 2×2 (4'×4') -->

    <!-- LEFT: Butterfly painting (2 × 2 = 4' × 4') -->
    <a-entity id="artwork" position="-5 2.6 -7.92">
      <a-box position="0  1.04 0" width="2.12" height="0.06" depth="0.06" material="color: #c8a96e; roughness: 0.3; metalness: 0.7"></a-box>
      <a-box position="0 -1.04 0" width="2.12" height="0.06" depth="0.06" material="color: #c8a96e; roughness: 0.3; metalness: 0.7"></a-box>
      <a-box position="-1.04 0 0" width="0.06" height="2.02" depth="0.06" material="color: #c8a96e; roughness: 0.3; metalness: 0.7"></a-box>
      <a-box position="1.04 0 0"  width="0.06" height="2.02" depth="0.06" material="color: #c8a96e; roughness: 0.3; metalness: 0.7"></a-box>
      <a-plane id="painting-plane" class="clickable art-chat" position="0 0 0.01" width="2" height="2"
               material="src: #painting; roughness: 0.85; metalness: 0"></a-plane>
    </a-entity>
    <a-entity position="-5 1.28 -7.9">
      <a-text value="Always Here With You" align="center" color="#8a6d3b" width="2.0" font="roboto" letter-spacing="2"></a-text>

  <script>
    /* ---- Procedural polished concrete floor — LIGHT warm grey ---- */
    AFRAME.registerComponent('procedural-concrete', {
      init: function () {
        var c = document.createElement('canvas');
        c.width = 1024; c.height = 1024;
        var ctx = c.getContext('2d');

        // Light warm grey base
        ctx.fillStyle = '#c8c3bc';
        ctx.fillRect(0, 0, c.width, c.height);

        // Subtle aggregate speckle
        for (var i = 0; i < 50000; i++) {
          var x = Math.random() * c.width;
          var y = Math.random() * c.height;
          var g = Math.floor(170 + Math.random() * 50);
          ctx.fillStyle = 'rgba(' + g + ',' + (g - 3) + ',' + (g - 6) + ',' + (0.03 + Math.random() * 0.06) + ')';
          ctx.fillRect(x, y, 1 + Math.random() * 2, 1 + Math.random() * 2);
        }

        // Mottled patches
        for (var p = 0; p < 70; p++) {
          var px = Math.random() * c.width;
          var py = Math.random() * c.height;
          var pr = 25 + Math.random() * 90;
          var pg = Math.floor(180 + Math.random() * 40);
          ctx.beginPath();
          ctx.arc(px, py, pr, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(' + pg + ',' + (pg - 2) + ',' + (pg - 5) + ',' + (0.03 + Math.random() * 0.05) + ')';
          ctx.fill();
        }

        // Faint hairline cracks
        ctx.strokeStyle = 'rgba(120, 115, 108, 0.08)';
        ctx.lineWidth = 0.5;
        for (var cr = 0; cr < 6; cr++) {
          ctx.beginPath();
          var cx = Math.random() * c.width;
          var cy = Math.random() * c.height;
          ctx.moveTo(cx, cy);
          for (var s = 0; s < 5; s++) {
            cx += (Math.random() - 0.5) * 140;
            cy += (Math.random() - 0.5) * 140;
            ctx.lineTo(cx, cy);
          }
          ctx.stroke();
        }

        // Subtle polish sheen — lighter bands
        for (var t = 0; t < 12; t++) {
          var ty = Math.random() * c.height;
          ctx.strokeStyle = 'rgba(210, 205, 198, ' + (0.04 + Math.random() * 0.05) + ')';
          ctx.lineWidth = 2 + Math.random() * 5;
          ctx.beginPath();
          ctx.moveTo(0, ty);
          ctx.bezierCurveTo(c.width * 0.3, ty + (Math.random() - 0.5) * 8,
                            c.width * 0.7, ty + (Math.random() - 0.5) * 8,
                            c.width, ty + (Math.random() - 0.5) * 5);
          ctx.stroke();
        }

        // Broad polished-sheen pools — soft radial gradients that read as reflected light
        // and give the floor real depth instead of a flat matte field.
        for (var b = 0; b < 9; b++) {
          var bx = Math.random() * c.width;
          var by = Math.random() * c.height;
          var br = 120 + Math.random() * 260;
          var grad = ctx.createRadialGradient(bx, by, 0, bx, by, br);
          grad.addColorStop(0, 'rgba(232, 228, 220, ' + (0.05 + Math.random() * 0.05) + ')');
          grad.addColorStop(1, 'rgba(232, 228, 220, 0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(bx, by, br, 0, Math.PI * 2);
          ctx.fill();
        }

        // A few darker burnished swirls for contrast and wet-look depth
        for (var d = 0; d < 5; d++) {
          var dx = Math.random() * c.width;
          var dy = Math.random() * c.height;
          var dr = 90 + Math.random() * 200;
          var dgrad = ctx.createRadialGradient(dx, dy, 0, dx, dy, dr);
          dgrad.addColorStop(0, 'rgba(150, 145, 138, ' + (0.03 + Math.random() * 0.03) + ')');
          dgrad.addColorStop(1, 'rgba(150, 145, 138, 0)');
          ctx.fillStyle = dgrad;
          ctx.beginPath();
          ctx.arc(dx, dy, dr, 0, Math.PI * 2);
          ctx.fill();
        }

        var url = c.toDataURL();
        this.el.setAttribute('material', 'src', url);
        this.el.setAttribute('material', 'repeat', '3 3');
      }
    });

    /* ---- Room boundary collision ---- */
    AFRAME.registerComponent('room-bounds', {
      schema: {
        xMin: { default: -11.2 }, xMax: { default: 11.2 },
        zMin: { default: -7.2 },  zMax: { default: 7.2 }
      },
      tick: function () {
        var p = this.el.object3D.position;
        if (p.x < this.data.xMin) p.x = this.data.xMin;
        if (p.x > this.data.xMax) p.x = this.data.xMax;
        if (p.z < this.data.zMin) p.z = this.data.zMin;
        if (p.z > this.data.zMax) p.z = this.data.zMax;
      }
    });

    /* ---- Entry screen, ambient music, mute toggle ---- */
    window.addEventListener('load', function () {
      var entry = document.getElementById('entry-screen');
      var enterBtn = document.getElementById('enter-btn');
      var muteBtn = document.getElementById('mute-btn');
      var audio = document.getElementById('ambient-audio');
      var camera = document.getElementById('camera');

      if (audio) { audio.volume = 0.25; audio.muted = false; audio.load(); }

      var musicStarted = false;
      function tryStartMusic() {
        if (!audio || musicStarted) return;
        var p = audio.play();
        if (p && p.then) {
          p.then(function () {
            musicStarted = true;
            if (muteBtn) muteBtn.classList.remove('muted');
          }).catch(function () { /* blocked — a later gesture will retry */ });
        } else {
          musicStarted = true;
        }
      }

      // Fallback: the FIRST real user gesture anywhere unlocks audio, in case
      // the browser blocked the Enter-Gallery click (autoplay policy varies).
      function gestureUnlock() {
        if (musicStarted || (audio && !audio.paused)) { removeGestureUnlock(); return; }
        tryStartMusic();
      }
      function removeGestureUnlock() {
        ['click', 'keydown', 'touchend', 'pointerdown'].forEach(function (evt) {
          document.removeEventListener(evt, gestureUnlock, true);
        });
      }
      ['click', 'keydown', 'touchend', 'pointerdown'].forEach(function (evt) {
        document.addEventListener(evt, gestureUnlock, true);
      });

      function setSceneControls(enabled) {
        if (!camera) return;
        camera.setAttribute('wasd-controls', 'enabled', enabled);
        camera.setAttribute('look-controls', 'enabled', enabled);
      }
      setSceneControls(false);

      if (enterBtn) {
        enterBtn.addEventListener('click', function () {
          // Start audio on this user gesture; retry shortly if the first play is blocked
          tryStartMusic();
          setTimeout(tryStartMusic, 250);

          entry.classList.add('fade-out');
          muteBtn.classList.add('visible');
          setSceneControls(true);
          setTimeout(function () {
            var h = document.getElementById('hint');
            if (h) h.classList.add('fade');
          }, 7000);
          setTimeout(function () {
            if (entry && entry.parentNode) entry.parentNode.removeChild(entry);
          }, 1600);
        });
      }

      // Also try to unlock audio on any user interaction within the entry screen
      if (entry && audio) {
        entry.addEventListener('click', function () {
          if (audio.paused) audio.play().catch(function () {});
        }, { once: false });
        entry.addEventListener('touchstart', function () {
          if (audio.paused) audio.play().catch(function () {});
        }, { once: false });
      }

      if (muteBtn) {
        muteBtn.addEventListener('click', function () {
          if (!audio) return;
          if (audio.paused) {
            audio.play().catch(function () {});
            muteBtn.classList.remove('muted');
          } else {
            audio.pause();
            muteBtn.classList.add('muted');
          }
        });
      }
    });

    /* ============================================================
       PAINTING CHATBOTS — each painting opens a chat panel with its
       own pre-loaded context, answered by Claude (claude-haiku-4-5)
       via the Anthropic Messages API.

       NOTE: Replace the placeholder below with a real key. Calling the
       Anthropic API directly from the browser exposes the key to anyone
       who views the page — for production, proxy this through a small
       server endpoint instead.
       ============================================================ */
    var ANTHROPIC_API_KEY = "ANTHROPIC_API_KEY"; // <-- placeholder; insert your key here
    var ANTHROPIC_MODEL = "claude-haiku-4-5";

    /* Artist bios — shared context woven into each painting's persona */
    var BIO_STEPH = "Stephanie Camacho was born into rhythm. Raised in New Jersey with Caribbean roots, her childhood home pulsed with music, movement, and love expressed through celebration. The city streets taught her to see — as a child she sketched mountains she'd never touched and waterfronts she'd never stood before. She has always painted what is coming before it arrives. After studying Interior Design at FIT, she lived aboard a sailboat on the Hudson River, worked the Pacific waters of Hawaii, and stood in the silence of Nevada's Black Mountains — the same mountains she once drew on a city sidewalk. Her paintings are not decorative; they are devotional — a pouring of memory and lineage. She paints the way she loves: fully, without holding back, always following where God leads.";
    var BIO_JAJAIRA = "Jajaira Berrios was born and raised in East Harlem. Art has always drawn her deeply. In elementary school her work was selected for a gallery, and soon after a children's doctor at Metropolitan Hospital wrote asking to purchase her artwork for his office — a letter she keeps to this day, the moment she realized she had a gift. She attended Art & Design High School and later majored in Communication Design in college. Life took her off course for a while, but art always finds its way back to her — whether through art or dance, it is simply what lights her up. Today her creative expression takes many forms: acrylic paintings, drawings, digital art, and hand-crafted bookmarks. She doesn't confine herself to one medium; she follows whatever calls her. Her hope is that her work inspires others to follow their own calling. Instagram: @j.barecreation.";
    var BIO_TARA = "Tara McIlroy is a Toronto-based painter who works largely in oil and acrylic. Her work moves between grief, memory, and the quiet beauty of everyday life, and she takes on commissions — including grief-inspired pieces.";

    /* Per-painting context, keyed by the painting plane's element id */
    var ART = {
      "painting-plane": {
        name: "Tara McIlroy", subtitle: "Always Here With You",
        greeting: "Hi — I'm an AI version of Tara. You're looking at “Always Here With You.” Ask me anything about it, or about commissioning a piece.",
        info: "Painting: “Always Here With You” by Tara McIlroy. Oil on canvas, 4 ft × 4 ft. This piece is NOT for sale, but Tara is taking commissions for similar grief-inspired works. " + BIO_TARA
      },
      "plane-tara2": {
        name: "Tara McIlroy", subtitle: "Somewhere Out There",
        greeting: "Hi — I'm an AI version of Tara. This is “Somewhere Out There.” What would you like to know?",
        info: "Painting: “Somewhere Out There” by Tara McIlroy. Acrylic on canvas, 1.5 ft × 3 ft. Price: $750 USD plus shipping. " + BIO_TARA
      },
      "plane-tara3": {
        name: "Tara McIlroy", subtitle: "It Was All A Dream",
        greeting: "Hi — I'm an AI version of Tara. This is “It Was All A Dream.” Ask me about it or about a commission.",
        info: "Painting: “It Was All A Dream” by Tara McIlroy. Acrylic on canvas, 4 ft × 4 ft. This piece is NOT for sale, but Tara is taking orders for commissions. " + BIO_TARA
      },
      "plane-steph1": {
        name: "Stephanie Camacho", subtitle: "When She Lets Go",
        greeting: "Hi — I'm an AI version of Stephanie. You're looking at “When She Lets Go.” Ask me anything.",
        info: "Painting: “When She Lets Go” by Stephanie Camacho. Acrylic and marker on canvas, 18″ × 24″, 2020. Inspired by Afro Latin tradition and the way she herself has always moved through the world. Because feeling doesn't wait for the details to be right. Feeling moves. Certain without looking up. Price: $1,100 USD plus shipping. " + BIO_STEPH
      },
      "plane-steph2": {
        name: "Stephanie Camacho", subtitle: "They Kept Rowing",
        greeting: "Hi — I'm an AI version of Stephanie. This is “They Kept Rowing.” What would you like to know?",
        info: "Painting: “They Kept Rowing” by Stephanie Camacho. Acrylic on canvas, 30″ × 40″. Inspired by the connection she felt to Hawaiian culture when she lived there — learning how the Hawaiian people move with urgency and grace. This painting is about moving forward: about three souls who decided to keep rowing even when the horizon was made of fire. NOTE: the photo shown is of the original sold work; Variation II will be painted to commission, and the buyer receives a fresh work from the same series. Price: $1,400 USD plus shipping. " + BIO_STEPH
      },
      "plane-steph3": {
        name: "Stephanie Camacho", subtitle: "Blood Memory",
        greeting: "Hi — I'm an AI version of Stephanie. This is “Blood Memory.” Ask me anything about it.",
        info: "Painting: “Blood Memory” by Stephanie Camacho. Acrylic, collaged paper, and marker on canvas, 16″ × 40″, 2011. Growing up she was always called an old soul, carrying a wisdom she couldn't explain and hadn't yet lived. Now she understands. The Taíno blood running through her Caribbean roots was never silent — it was simply waiting for the right moment to speak through her hands. This face is that moment. Price: $1,500 USD plus shipping. " + BIO_STEPH
      },
      "plane-intertwined": {
        name: "Jajaira Berrios", subtitle: "Intertwined",
        greeting: "Hi — I'm an AI version of Jajaira. You're looking at “Intertwined.” Ask me anything. Be love.",
        info: "Painting: “Intertwined” by Jajaira Berrios. This acrylic painting is a beautifully rendered replica reimagined through an abstract lens and brought to life with a vibrant, mixed palette. It captures two women face to face, their lips barely grazing in a moment suspended between longing and surrender. Theme: “Be love.” Material: Canvas. Medium: Acrylic Paint. Size: 12 × 16 in. Instagram: @j.barecreation. " + BIO_JAJAIRA
      },
      "plane-dia": {
        name: "Jajaira Berrios", subtitle: "Dia De Los Muertos",
        greeting: "Hi — I'm an AI version of Jajaira. This is “Dia De Los Muertos.” Soft and untouchable. What would you like to know?",
        info: "Drawing: “Dia De Los Muertos” by Jajaira Berrios. Inspired by the Day of the Dead, a Mexican holiday that celebrates death as a natural part of life. This piece honors the coexistence of death, beauty, spirit and memory. She wears both strength and softness without fear. Theme: “Soft and untouchable.” Material: Heavy weight white art paper, displayed in a boxed frame. Medium: Pencil Drawing. Size: 12 × 16 in. Instagram: @j.barecreation. " + BIO_JAJAIRA
      },
      "plane-unapologetic": {
        name: "Jajaira Berrios", subtitle: "Unapologetic",
        greeting: "Hi — I'm an AI version of Jajaira. This is “Unapologetic.” Own your own sensuality. Ask me anything.",
        info: "Drawing: “Unapologetic” by Jajaira Berrios. A woman standing fully within her sensuality, untouched by shame. The words around her are not burdens — they are truths, desires, emotions, and freedoms she no longer hides from. Theme: “Own your own sensuality.” Material: Sketchbook drawing on mixed media white paper with an added brown texture paper. Medium: Colored Pencils and Black markers. Size: 5″ × 8″. Instagram: @j.barecreation. " + BIO_JAJAIRA
      }
    };

    function systemPromptFor(ctx) {
      return "You are " + ctx.name + ", speaking in first person as an AI persona of the artist, talking with a visitor standing in front of your work “" + ctx.subtitle + "” in the Vizual Ninja Studios virtual gallery. Be warm, personal, and grounded. Keep replies concise — usually 2 to 4 sentences. Speak from the specific details below; never invent prices, dimensions, or facts not given. If asked about buying or commissions, share what you know and warmly invite them to reach out (via the gallery or the artist's Instagram if given). If asked something unrelated to your art or life as an artist, gently steer back to the work.\n\nEverything you know about this piece and yourself:\n" + ctx.info;
    }

    /* ---- Chat panel + painting chatbots + double-click navigation ---- */
    window.addEventListener('load', function () {
      var panel = document.getElementById('chat-panel');
      var closeBtn = document.getElementById('chat-close');
      var form = document.getElementById('chat-form');
      var input = document.getElementById('chat-input');
      var sendBtn = document.getElementById('chat-send');
      var messagesEl = document.getElementById('chat-messages');
      var typingEl = document.getElementById('chat-typing');
      var nameEl = document.getElementById('chat-name');
      var subEl = document.getElementById('chat-subtitle');
      var camera = document.getElementById('camera');
      var rig = document.getElementById('rig');

      var current = null;      // active painting context
      var history = [];        // [{role:'user'|'assistant', content}] — excludes greeting
      var busy = false;

      function setControls(enabled) {
        if (!camera) return;
        camera.setAttribute('wasd-controls', 'enabled', enabled);
        camera.setAttribute('look-controls', 'enabled', enabled);
      }

      function renderMessage(role, text) {
        var div = document.createElement('div');
        div.className = 'msg ' + role;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function openChatFor(id) {
        var ctx = ART[id];
        if (!ctx) return;
        current = ctx;
        history = [];
        messagesEl.innerHTML = '';
        nameEl.textContent = ctx.name;
        subEl.textContent = ctx.subtitle;
        input.placeholder = 'Ask ' + ctx.name.split(' ')[0] + ' about this work…';
        renderMessage('assistant', ctx.greeting);
        panel.classList.add('open');
        panel.setAttribute('aria-hidden', 'false');
        setControls(false);
        setTimeout(function () { input.focus(); }, 450);
      }

      function closeChat() {
        panel.classList.remove('open');
        panel.setAttribute('aria-hidden', 'true');
        setControls(true);
      }

      /* ---- Painting click → open that painting's chat ---- */
      var planes = document.querySelectorAll('.art-chat');
      for (var i = 0; i < planes.length; i++) {
        (function (el) {
          el.addEventListener('click', function () { openChatFor(el.id); });
        })(planes[i]);
      }

      /* ---- Floor double-click navigation ---- */
      var floor = document.getElementById('floor');
      var navPin = document.getElementById('nav-pin');
      var floorClickTimer = null;
      var ROOM_X_MIN = -11.1, ROOM_X_MAX = 11.1;
      var ROOM_Z_MIN = -7.1,  ROOM_Z_MAX = 7.1;

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

      function animateRig(toX, toY, toZ, dur) {
        if (!rig) return;
        rig.setAttribute('animation__move', {
          property: 'position', to: toX + ' ' + toY + ' ' + toZ,
          dur: dur || 1200, easing: 'easeInOutQuad'
        });
      }

      function flashPin(x, z) {
        if (!navPin) return;
        navPin.setAttribute('position', x + ' 0.02 ' + z);
        navPin.removeAttribute('animation__pin');
        navPin.setAttribute('material', 'opacity', 0.8);
        navPin.setAttribute('animation__pin', {
          property: 'material.opacity', from: 0.8, to: 0, dur: 1200, easing: 'easeOutQuad'
        });
      }

      function moveToFloorPoint(pt) {
        if (!rig || !camera) return;
        var tx = clamp(pt.x, ROOM_X_MIN, ROOM_X_MAX);
        var tz = clamp(pt.z, ROOM_Z_MIN, ROOM_Z_MAX);
        var cam = camera.object3D.position;
        var rx = clamp(tx - cam.x, ROOM_X_MIN, ROOM_X_MAX);
        var rz = clamp(tz - cam.z, ROOM_Z_MIN, ROOM_Z_MAX);
        var rp = rig.object3D.position;
        var dx = rx - rp.x, dz = rz - rp.z;
        var dist = Math.sqrt(dx * dx + dz * dz);
        animateRig(rx, 0, rz, clamp(500 + dist * 120, 500, 1600));
        flashPin(tx, tz);
      }

      function onFloorClick(e) {
        var hit = e.detail && e.detail.intersection;
        if (!hit || !hit.point) return;
        var pt = hit.point;
        if (floorClickTimer) {
          clearTimeout(floorClickTimer);
          floorClickTimer = null;
          moveToFloorPoint(pt);
        } else {
          floorClickTimer = setTimeout(function () { floorClickTimer = null; }, 280);
        }
      }

      if (floor) floor.addEventListener('click', onFloorClick);
      if (closeBtn) closeBtn.addEventListener('click', closeChat);
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && panel.classList.contains('open')) closeChat();
      });

      /* ---- Send a message to Claude ---- */
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        if (busy || !current) return;
        var text = input.value.trim();
        if (!text) return;
        input.value = '';
        history.push({ role: 'user', content: text });
        renderMessage('user', text);
        busy = true; sendBtn.disabled = true; typingEl.classList.add('show');

        fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'content-type': 'application/json',
            'x-api-key': ANTHROPIC_API_KEY,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: ANTHROPIC_MODEL,
            max_tokens: 512,
            system: systemPromptFor(current),
            messages: history
          })
        })
        .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
        .then(function (result) {
          if (!result.ok) {
            var em = result.data && result.data.error && result.data.error.message;
            throw new Error(em || 'The studio could not be reached just now.');
          }
          var reply = result.data && result.data.content && result.data.content[0] && result.data.content[0].text;
          if (!reply) throw new Error('No response.');
          history.push({ role: 'assistant', content: reply });
          renderMessage('assistant', reply);
        })
        .catch(function (err) { renderMessage('error', err.message || 'Sorry, I could not reach the studio just now.'); })
        .finally(function () { busy = false; sendBtn.disabled = false; typingEl.classList.remove('show'); input.focus(); });
      });
    });
  </script>
</body>
