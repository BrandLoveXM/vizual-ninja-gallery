<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vizual Ninja Studios — Gallery Room 1</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; font-family: 'Helvetica Neue', Arial, sans-serif; }

    /* On-screen hint */
    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(20, 20, 20, 0.72);
      color: #f3f3f3;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: 0.02em;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #hint.fade { opacity: 0; }

    /* Gallery wordmark */
    #brand {
      position: fixed;
      top: 18px;
      left: 20px;
      z-index: 10;
      color: #f3f3f3;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    /* ===================== CHAT PANEL ===================== */
    #chat-panel {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 20;
      width: 380px;
      max-width: 92vw;
      height: 100%;
      background: #fbfbf9;
      box-shadow: -12px 0 40px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.42s cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    #chat-panel.open { transform: translateX(0); }

    #chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      background: #1c1c1e;
      color: #fff;
    }
    .chat-name { font-size: 16px; font-weight: 600; letter-spacing: 0.01em; }
    .chat-sub {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #b9b9b9;
      margin-top: 3px;
    }
    #chat-close {
      background: none;
      border: none;
      color: #ddd;
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
    }
    #chat-close:hover { color: #fff; }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 84%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #eceae5;
      color: #1f1f1f;
      border-bottom-left-radius: 4px;
    }
    .msg.user {
      align-self: flex-end;
      background: #2c1d10;
      color: #f6f1ea;
      border-bottom-right-radius: 4px;
    }
    .msg.error {
      align-self: flex-start;
      background: #f6dede;
      color: #7a2020;
      border-bottom-left-radius: 4px;
    }

    #chat-typing {
      padding: 0 20px 6px;
      font-size: 12px;
      font-style: italic;
      color: #8a8a8a;
      display: none;
    }
    #chat-typing.show { display: block; }

    #chat-form {
      display: flex;
      gap: 8px;
      padding: 14px 16px;
      border-top: 1px solid #e4e2dc;
      background: #fff;
    }
    #chat-input {
      flex: 1;
      border: 1px solid #d6d4ce;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    #chat-input:focus { border-color: #2c1d10; }
    #chat-send {
      background: #2c1d10;
      color: #f6f1ea;
      border: none;
      border-radius: 999px;
      padding: 0 18px;
      font-size: 14px;
      cursor: pointer;
    }
    #chat-send:hover { background: #43301d; }
    #chat-send:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div id="brand">Vizual Ninja Studios</div>
  <div id="hint">WASD / arrow keys to walk &nbsp;·&nbsp; drag to look around &nbsp;·&nbsp; click the painting to chat &nbsp;·&nbsp; double-click anywhere to glide there</div>

  <!-- ===================== CHAT PANEL ===================== -->
  <div id="chat-panel" aria-hidden="true">
    <div id="chat-header">
      <div>
        <div class="chat-name">Tara McIlroy</div>
        <div class="chat-sub">Artist &middot; Toronto</div>
      </div>
      <button id="chat-close" aria-label="Close chat">&times;</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-typing">Tara is typing&hellip;</div>
    <form id="chat-form">
      <input id="chat-input" type="text" placeholder="Ask Tara about her work&hellip;" autocomplete="off" />
      <button id="chat-send" type="submit">Send</button>
    </form>
  </div>

  <a-scene background="color: #0d0d0f" renderer="colorManagement: true; antialias: true" cursor="rayOrigin: mouse" raycaster="objects: .clickable">

    <a-assets>
      <img id="painting" src="painting.jpg" crossorigin="anonymous" />
    </a-assets>

    <!-- ===================== LIGHTING ===================== -->
    <!-- Soft ambient fill so the room reads as bright and clean -->
    <a-entity light="type: ambient; color: #ffffff; intensity: 0.55"></a-entity>

    <!-- General room light from above -->
    <a-entity light="type: directional; color: #fff7ec; intensity: 0.45"
              position="3 6 4"></a-entity>
    <a-entity light="type: point; color: #fff7ec; intensity: 0.35; distance: 22; decay: 2"
              position="0 3.6 2"></a-entity>

    <!-- Spotlight aimed at the painting -->
    <a-entity id="art-spot"
              light="type: spot; color: #fff4e0; intensity: 1.8; angle: 32; penumbra: 0.35; distance: 14; decay: 1.4; target: #painting-plane"
              position="0 3.7 -4.3"></a-entity>

    <!-- ===================== ROOM SHELL ===================== -->
    <!-- Room interior: 12 (x) wide, 4 (y) tall, 12 (z) deep -->

    <!-- Wooden floor (procedural plank texture) -->
    <a-plane id="floor" class="clickable" procedural-wood
             rotation="-90 0 0" position="0 0 0"
             width="12" height="12"
             material="roughness: 0.7; metalness: 0.05"></a-plane>

    <!-- Landing pin shown briefly where the visitor double-clicks -->
    <a-ring id="nav-pin"
            radius-inner="0.18" radius-outer="0.3"
            rotation="-90 0 0" position="0 -10 0"
            material="color: #fff4e0; shader: flat; transparent: true; opacity: 0; side: double"></a-ring>

    <!-- Ceiling -->
    <a-plane rotation="90 0 0" position="0 4 0" width="12" height="12"
             material="color: #fbfbfb; roughness: 1"></a-plane>

    <!-- Far wall (where the painting hangs), z = -6 -->
    <a-plane position="0 2 -6" width="12" height="4"
             material="color: #f4f4f2; roughness: 1"></a-plane>

    <!-- Back wall, z = 6 -->
    <a-plane rotation="0 180 0" position="0 2 6" width="12" height="4"
             material="color: #f4f4f2; roughness: 1"></a-plane>

    <!-- Left wall, x = -6 -->
    <a-plane rotation="0 90 0" position="-6 2 0" width="12" height="4"
             material="color: #efefed; roughness: 1"></a-plane>

    <!-- Right wall, x = 6 -->
    <a-plane rotation="0 -90 0" position="6 2 0" width="12" height="4"
             material="color: #efefed; roughness: 1"></a-plane>

    <!-- Baseboards for a finished look -->
    <a-box position="0 0.06 -5.96" width="12" height="0.12" depth="0.05"
           material="color: #e3e3e0; roughness: 1"></a-box>
    <a-box position="0 0.06 5.96" width="12" height="0.12" depth="0.05"
           material="color: #e3e3e0; roughness: 1"></a-box>
    <a-box position="-5.96 0.06 0" width="0.05" height="0.12" depth="12"
           material="color: #e3e3e0; roughness: 1"></a-box>
    <a-box position="5.96 0.06 0" width="0.05" height="0.12" depth="12"
           material="color: #e3e3e0; roughness: 1"></a-box>

    <!-- ===================== ARTWORK ===================== -->
    <!-- Square painting in a dark wooden frame, mounted on far wall -->
    <a-entity id="artwork" position="0 1.7 -5.9">

      <!-- Dark wooden frame (four members) -->
      <!-- painting is 2 x 2; frame border 0.14 thick, 0.12 deep -->
      <a-box class="frame" position="0  1.07 -0.01" width="2.28" height="0.14" depth="0.13"
             material="color: #2c1d10; roughness: 0.55; metalness: 0.1"></a-box>
      <a-box class="frame" position="0 -1.07 -0.01" width="2.28" height="0.14" depth="0.13"
             material="color: #2c1d10; roughness: 0.55; metalness: 0.1"></a-box>
      <a-box class="frame" position="-1.07 0 -0.01" width="0.14" height="2.00" depth="0.13"
             material="color: #2c1d10; roughness: 0.55; metalness: 0.1"></a-box>
      <a-box class="frame" position="1.07 0 -0.01" width="0.14" height="2.00" depth="0.13"
             material="color: #2c1d10; roughness: 0.55; metalness: 0.1"></a-box>

      <!-- Inner bevel / matte edge -->
      <a-box position="0 0 -0.05" width="2.06" height="2.06" depth="0.06"
             material="color: #1a1109; roughness: 0.6"></a-box>

      <!-- The painting itself -->
      <a-plane id="painting-plane" class="clickable" position="0 0 0.02"
               width="2" height="2"
               material="src: #painting; roughness: 0.9; metalness: 0"></a-plane>
    </a-entity>

    <!-- Caption plaque beside the painting -->
    <a-entity position="1.55 1.2 -5.93">
      <a-plane width="0.62" height="0.22" material="color: #ffffff; roughness: 1"></a-plane>
      <a-text value="TARA McILROY\nUntitled — Toronto"
              align="center" color="#222" width="1.2"
              position="0 0 0.01"></a-text>
    </a-entity>

    <!-- ===================== BACK-CORNER LOUNGE ===================== -->
    <!-- Patterned kilim rug -->
    <a-plane procedural-rug
             rotation="-90 0 0" position="-3 0.011 3.6"
             width="4.4" height="3.2"
             material="roughness: 0.95; metalness: 0"></a-plane>

    <!-- Left mustard barrel armchair -->
    <a-entity class="armchair" position="-3.95 0 3.85" rotation="0 12 0">
      <!-- lower body / base -->
      <a-cylinder position="0 0.28 0" radius="0.55" height="0.56" segments-radial="40"
                  material="color: #d39a2a; roughness: 0.9; metalness: 0.02"></a-cylinder>
      <!-- seat cushion (slightly lighter) -->
      <a-cylinder position="0 0.61 0" radius="0.5" height="0.14" segments-radial="40"
                  material="color: #dca837; roughness: 0.9"></a-cylinder>
      <!-- curved wrap-around backrest (open at front, facing -Z) -->
      <a-cylinder position="0 0.95 0" radius="0.55" height="0.85"
                  open-ended="true" theta-start="0" theta-length="180"
                  segments-radial="40"
                  material="color: #d39a2a; roughness: 0.9; side: double"></a-cylinder>
      <!-- backrest top lip -->
      <a-torus position="0 1.37 0" radius="0.55" radius-tubular="0.04"
               theta-start="0" arc="180" rotation="90 0 0"
               material="color: #c98e22; roughness: 0.85"></a-torus>
      <!-- magenta accent pillow -->
      <a-box position="0 0.85 -0.12" width="0.62" height="0.5" depth="0.22"
             rotation="-12 0 0"
             material="color: #c1268d; roughness: 0.75"></a-box>
    </a-entity>

    <!-- Right mustard barrel armchair (with a "patterned" pillow) -->
    <a-entity class="armchair" position="-2.05 0 3.85" rotation="0 -12 0">
      <a-cylinder position="0 0.28 0" radius="0.55" height="0.56" segments-radial="40"
                  material="color: #d39a2a; roughness: 0.9; metalness: 0.02"></a-cylinder>
      <a-cylinder position="0 0.61 0" radius="0.5" height="0.14" segments-radial="40"
                  material="color: #dca837; roughness: 0.9"></a-cylinder>
      <a-cylinder position="0 0.95 0" radius="0.55" height="0.85"
                  open-ended="true" theta-start="0" theta-length="180"
                  segments-radial="40"
                  material="color: #d39a2a; roughness: 0.9; side: double"></a-cylinder>
      <a-torus position="0 1.37 0" radius="0.55" radius-tubular="0.04"
               theta-start="0" arc="180" rotation="90 0 0"
               material="color: #c98e22; roughness: 0.85"></a-torus>
      <!-- patchwork-style accent pillow -->
      <a-entity position="0 0.85 -0.12" rotation="-12 0 0">
        <a-box position="0 0 0" width="0.62" height="0.5" depth="0.22"
               material="color: #6a55a8; roughness: 0.75"></a-box>
        <a-box position="-0.15 0.12 -0.12" width="0.22" height="0.16" depth="0.005"
               material="color: #c1268d; roughness: 0.75"></a-box>
        <a-box position="0.12 0.08 -0.12" width="0.18" height="0.12" depth="0.005"
               material="color: #d49228; roughness: 0.75"></a-box>
        <a-box position="-0.05 -0.12 -0.12" width="0.2" height="0.14" depth="0.005"
               material="color: #3a5b6b; roughness: 0.75"></a-box>
        <a-box position="0.16 -0.13 -0.12" width="0.16" height="0.14" depth="0.005"
               material="color: #b73a2a; roughness: 0.75"></a-box>
      </a-entity>
    </a-entity>

    <!-- Round glass coffee table with sculptural chrome base -->
    <a-entity position="-3 0 2.95">
      <!-- chrome figural base (stacked abstract form) -->
      <a-cylinder position="0 0.04 0" radius="0.22" height="0.08" segments-radial="32"
                  material="color: #b8b8b8; roughness: 0.18; metalness: 0.95"></a-cylinder>
      <a-sphere position="-0.07 0.18 0" radius="0.13"
                material="color: #c6c6c6; roughness: 0.18; metalness: 0.95"></a-sphere>
      <a-sphere position="0.07 0.18 0" radius="0.13"
                material="color: #c6c6c6; roughness: 0.18; metalness: 0.95"></a-sphere>
      <a-cylinder position="0 0.34 0" radius="0.09" height="0.22" segments-radial="32"
                  material="color: #c6c6c6; roughness: 0.18; metalness: 0.95"></a-cylinder>
      <a-sphere position="0 0.48 0" radius="0.12"
                material="color: #c6c6c6; roughness: 0.18; metalness: 0.95"></a-sphere>
      <!-- glass top -->
      <a-cylinder position="0 0.555 0" radius="0.6" height="0.025" segments-radial="48"
                  material="color: #d4ecf0; opacity: 0.4; transparent: true;
                            roughness: 0.05; metalness: 0.1; side: double"></a-cylinder>
      <!-- a small purple glass orb sitting on the table -->
      <a-sphere position="-0.25 0.62 0.1" radius="0.07"
                material="color: #6a2a8a; opacity: 0.7; transparent: true;
                          roughness: 0.15; metalness: 0.1"></a-sphere>
      <a-cylinder position="0.18 0.6 -0.1" radius="0.05" height="0.09"
                  material="color: #e8e8e8; roughness: 0.1; metalness: 0.05;
                            opacity: 0.6; transparent: true"></a-cylinder>
    </a-entity>

    <!-- Small dark pedestal with vase + flowers between the chairs -->
    <a-entity position="-3 0 4.7">
      <a-box position="0 0.42 0" width="0.42" height="0.84" depth="0.38"
             material="color: #1f3a32; roughness: 0.85"></a-box>
      <!-- glass vase -->
      <a-cylinder position="0 0.97 0" radius="0.085" height="0.26"
                  material="color: #b5d6e0; opacity: 0.45; transparent: true;
                            roughness: 0.1; metalness: 0.1; side: double"></a-cylinder>
      <!-- stems -->
      <a-cylinder position="-0.02 1.18 0.01" radius="0.005" height="0.32"
                  rotation="6 0 -4" material="color: #2c5236; roughness: 1"></a-cylinder>
      <a-cylinder position="0.025 1.2 -0.02" radius="0.005" height="0.36"
                  rotation="-4 0 8" material="color: #2c5236; roughness: 1"></a-cylinder>
      <a-cylinder position="0 1.16 0.03" radius="0.005" height="0.28"
                  rotation="2 0 0" material="color: #2c5236; roughness: 1"></a-cylinder>
      <!-- flower heads -->
      <a-sphere position="-0.04 1.34 0.02" radius="0.05"
                material="color: #c1268d; roughness: 0.85"></a-sphere>
      <a-sphere position="0.05 1.37 -0.03" radius="0.045"
                material="color: #b73a2a; roughness: 0.85"></a-sphere>
      <a-sphere position="0.01 1.30 0.05" radius="0.04"
                material="color: #6a55a8; roughness: 0.85"></a-sphere>
      <a-sphere position="-0.02 1.39 -0.01" radius="0.038"
                material="color: #3a5b6b; roughness: 0.85"></a-sphere>
    </a-entity>

    <!-- Soft warm fill light for the lounge corner -->
    <a-entity light="type: point; color: #ffd9a3; intensity: 0.55; distance: 6; decay: 1.6"
              position="-3 2.4 3.6"></a-entity>

    <!-- ===================== VISITOR ===================== -->
    <a-entity id="rig" position="0 0 4.5" room-bounds>
      <a-entity id="camera" camera position="0 1.6 0"
                look-controls="pointerLockEnabled: false; reverseMouseDrag: true; reverseTouchDrag: true"
                wasd-controls="acceleration: 28"></a-entity>
    </a-entity>

  </a-scene>

  <script>
    /* ---- Procedural wooden floor texture (self-contained, no asset files) ---- */
    AFRAME.registerComponent('procedural-wood', {
      init: function () {
        var c = document.createElement('canvas');
        c.width = 512; c.height = 512;
        var ctx = c.getContext('2d');
        var planks = 6;
        var ph = c.height / planks;
        var base = ['#b98c5a', '#b3854f', '#c0915f', '#ad7e48', '#bb8a55', '#b58652'];
        for (var i = 0; i < planks; i++) {
          ctx.fillStyle = base[i % base.length];
          ctx.fillRect(0, i * ph, c.width, ph);
          // subtle grain streaks
          for (var g = 0; g < 26; g++) {
            ctx.strokeStyle = 'rgba(80,55,30,' + (0.04 + Math.random() * 0.07) + ')';
            ctx.lineWidth = 0.5 + Math.random() * 1.4;
            var y = i * ph + Math.random() * ph;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.bezierCurveTo(c.width * 0.33, y + (Math.random() - 0.5) * 8,
                              c.width * 0.66, y + (Math.random() - 0.5) * 8,
                              c.width, y + (Math.random() - 0.5) * 6);
            ctx.stroke();
          }
          // plank seam
          ctx.fillStyle = 'rgba(40,25,12,0.5)';
          ctx.fillRect(0, i * ph, c.width, 1.5);
        }
        var url = c.toDataURL();
        this.el.setAttribute('material', 'src', url);
        this.el.setAttribute('material', 'repeat', '4 4');
      }
    });

    /* ---- Procedural kilim-style rug texture ---- */
    AFRAME.registerComponent('procedural-rug', {
      init: function () {
        var c = document.createElement('canvas');
        c.width = 1024; c.height = 768;
        var ctx = c.getContext('2d');
        var W = c.width, H = c.height;

        // Sand/cream field
        ctx.fillStyle = '#d6bb8b';
        ctx.fillRect(0, 0, W, H);

        // Dark outer border
        ctx.strokeStyle = '#3e2014';
        ctx.lineWidth = 18;
        ctx.strokeRect(9, 9, W - 18, H - 18);

        // "Toothed" inner band on all four sides
        var teeth = ['#b73a2a', '#3a5b6b', '#cf8a3a', '#5e7a3a', '#7a3a6a'];
        var t = 36;
        function tooth(x1, y1, x2, y2, x3, y3, color) {
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3);
          ctx.closePath(); ctx.fill();
        }
        for (var x = 32; x < W - 32 - t; x += t) {
          var col = teeth[((x / t) | 0) % teeth.length];
          tooth(x, 32, x + t, 32, x + t / 2, 32 + 26, col);
          tooth(x, H - 32, x + t, H - 32, x + t / 2, H - 32 - 26, col);
        }
        for (var y = 32; y < H - 32 - t; y += t) {
          var col2 = teeth[((y / t) | 0) % teeth.length];
          tooth(32, y, 32, y + t, 32 + 26, y + t / 2, col2);
          tooth(W - 32, y, W - 32, y + t, W - 32 - 26, y + t / 2, col2);
        }

        // Central row of stepped diamonds
        var cy = H / 2;
        var diaColors = ['#b73a2a', '#3a5b6b', '#d49228', '#5e7a3a', '#7a3a6a', '#3a5b6b', '#b73a2a'];
        var step = 130;
        var startX = (W - step * 6) / 2;
        function diamond(cx, cyy, s, color) {
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.moveTo(cx, cyy - s);
          ctx.lineTo(cx + s, cyy);
          ctx.lineTo(cx, cyy + s);
          ctx.lineTo(cx - s, cyy);
          ctx.closePath();
          ctx.fill();
        }
        for (var d = 0; d < 7; d++) {
          var cx = startX + d * step;
          diamond(cx, cy, 60, diaColors[d]);
          diamond(cx, cy, 38, '#d6bb8b');
          diamond(cx, cy, 18, diaColors[(d + 3) % diaColors.length]);
        }

        // Horizontal accent stripes framing the diamond row
        ctx.fillStyle = '#9a3a2a';
        ctx.fillRect(110, cy - 118, W - 220, 6);
        ctx.fillRect(110, cy + 112, W - 220, 6);
        ctx.fillStyle = '#3a5b6b';
        ctx.fillRect(110, cy - 102, W - 220, 3);
        ctx.fillRect(110, cy + 99, W - 220, 3);

        // Subtle worn-in noise so it doesn't look CG-perfect
        for (var n = 0; n < 1400; n++) {
          ctx.fillStyle = 'rgba(60,40,20,' + (Math.random() * 0.08) + ')';
          ctx.fillRect(Math.random() * W, Math.random() * H, 2, 1);
        }

        var url = c.toDataURL();
        this.el.setAttribute('material', 'src', url);
        this.el.setAttribute('material', 'repeat', '1 1');
      }
    });

    /* ---- Keep the visitor inside the room ---- */
    AFRAME.registerComponent('room-bounds', {
      schema: { min: { default: -5.5 }, max: { default: 5.5 } },
      tick: function () {
        var p = this.el.object3D.position;
        if (p.x < this.data.min) p.x = this.data.min;
        if (p.x > this.data.max) p.x = this.data.max;
        if (p.z < this.data.min) p.z = this.data.min;
        if (p.z > this.data.max) p.z = this.data.max;
      }
    });

    /* ---- Fade the hint after a few seconds ---- */
    window.addEventListener('load', function () {
      setTimeout(function () {
        var h = document.getElementById('hint');
        if (h) h.classList.add('fade');
      }, 7000);
    });

    /* ---- Chat panel: talk to an AI version of the artist ---- */
    window.addEventListener('load', function () {
      var panel = document.getElementById('chat-panel');
      var painting = document.getElementById('painting-plane');
      var closeBtn = document.getElementById('chat-close');
      var form = document.getElementById('chat-form');
      var input = document.getElementById('chat-input');
      var sendBtn = document.getElementById('chat-send');
      var messagesEl = document.getElementById('chat-messages');
      var typingEl = document.getElementById('chat-typing');
      var camera = document.getElementById('camera');
      var rig = document.getElementById('rig');

      var GREETING = "Hi — I'm Tara, or rather an AI version of me. Welcome to my room at Vizual Ninja Studios. That piece in front of you came out of a long Toronto winter. Ask me anything about it, or about how I work.";

      // Conversation history sent to the API (greeting included for context).
      var convo = [{ role: 'assistant', content: GREETING }];
      var opened = false;
      var busy = false;

      function setControls(enabled) {
        if (!camera) return;
        camera.setAttribute('wasd-controls', 'enabled', enabled);
        camera.setAttribute('look-controls', 'enabled', enabled);
      }

      function renderMessage(role, text) {
        var div = document.createElement('div');
        div.className = 'msg ' + role;
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function openChat() {
        panel.classList.add('open');
        panel.setAttribute('aria-hidden', 'false');
        setControls(false);
        if (!opened) {
          opened = true;
          renderMessage('assistant', GREETING);
        }
        setTimeout(function () { input.focus(); }, 450);
      }

      function closeChat() {
        panel.classList.remove('open');
        panel.setAttribute('aria-hidden', 'true');
        setControls(true);
      }

      /* Google-Earth-style navigation: double-click the floor to glide
         to that spot. Double-click the painting for a centered close-up;
         double-click again to step back. */
      var floor = document.getElementById('floor');
      var navPin = document.getElementById('nav-pin');
      var zoomed = false;
      var savedRigPos = null;
      var paintingClickTimer = null;
      var floorClickTimer = null;

      var ROOM_MIN = -5.4;
      var ROOM_MAX = 5.4;

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

      function animateRig(toX, toY, toZ, dur) {
        if (!rig) return;
        rig.setAttribute('animation__move', {
          property: 'position',
          to: toX + ' ' + toY + ' ' + toZ,
          dur: dur || 1100,
          easing: 'easeInOutQuad'
        });
      }

      function flashPin(x, z) {
        if (!navPin) return;
        navPin.setAttribute('position', x + ' 0.02 ' + z);
        navPin.removeAttribute('animation__pin');
        navPin.setAttribute('material', 'opacity', 0.95);
        navPin.setAttribute('animation__pin', {
          property: 'material.opacity',
          from: 0.95,
          to: 0,
          dur: 1100,
          easing: 'easeOutQuad'
        });
      }

      function moveToFloorPoint(pt) {
        if (!rig || !camera) return;
        // Keep the visitor a touch inside the walls.
        var targetWorldX = clamp(pt.x, ROOM_MIN, ROOM_MAX);
        var targetWorldZ = clamp(pt.z, ROOM_MIN, ROOM_MAX);

        // Rig position is offset so the camera (which WASD walks within
        // the rig) ends up at the requested world point.
        var cam = camera.object3D.position;
        var rigTargetX = clamp(targetWorldX - cam.x, ROOM_MIN, ROOM_MAX);
        var rigTargetZ = clamp(targetWorldZ - cam.z, ROOM_MIN, ROOM_MAX);

        // Duration scales gently with distance so close moves feel snappy.
        var rp = rig.object3D.position;
        var dx = rigTargetX - rp.x;
        var dz = rigTargetZ - rp.z;
        var dist = Math.sqrt(dx * dx + dz * dz);
        var dur = clamp(450 + dist * 140, 500, 1500);

        animateRig(rigTargetX, 0, rigTargetZ, dur);
        flashPin(targetWorldX, targetWorldZ);

        // Manual navigation invalidates the painting close-up "home".
        zoomed = false;
        savedRigPos = null;
      }

      function toggleCloseUp() {
        if (!rig || !camera) return;
        if (!zoomed) {
          var rp = rig.object3D.position;
          savedRigPos = { x: rp.x, y: rp.y, z: rp.z };
          var cam = camera.object3D.position;
          animateRig(-cam.x, 0, -2.8 - cam.z, 1100);
          zoomed = true;
        } else {
          animateRig(savedRigPos.x, savedRigPos.y, savedRigPos.z, 1100);
          zoomed = false;
          savedRigPos = null;
        }
      }

      // A-Frame only emits 'click', so we debounce to tell single vs double.
      function onPaintingClick() {
        if (paintingClickTimer) {
          clearTimeout(paintingClickTimer);
          paintingClickTimer = null;
          toggleCloseUp();
        } else {
          paintingClickTimer = setTimeout(function () {
            paintingClickTimer = null;
            openChat();
          }, 260);
        }
      }

      function onFloorClick(e) {
        var hit = e.detail && e.detail.intersection;
        if (!hit || !hit.point) return;
        var pt = hit.point;
        if (floorClickTimer) {
          clearTimeout(floorClickTimer);
          floorClickTimer = null;
          moveToFloorPoint(pt);
        } else {
          floorClickTimer = setTimeout(function () {
            floorClickTimer = null;
          }, 280);
        }
      }

      if (painting) painting.addEventListener('click', onPaintingClick);
      if (floor) floor.addEventListener('click', onFloorClick);
      if (closeBtn) closeBtn.addEventListener('click', closeChat);
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && panel.classList.contains('open')) closeChat();
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        if (busy) return;
        var text = input.value.trim();
        if (!text) return;

        input.value = '';
        convo.push({ role: 'user', content: text });
        renderMessage('user', text);

        busy = true;
        sendBtn.disabled = true;
        typingEl.classList.add('show');

        fetch('/api/chat', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ messages: convo })
        })
          .then(function (res) {
            return res.json().then(function (data) {
              return { ok: res.ok, data: data };
            });
          })
          .then(function (result) {
            if (!result.ok || !result.data.reply) {
              throw new Error((result.data && result.data.error) || 'No response.');
            }
            convo.push({ role: 'assistant', content: result.data.reply });
            renderMessage('assistant', result.data.reply);
          })
          .catch(function (err) {
            renderMessage('error', err.message || 'Sorry, I could not reach the studio just now.');
          })
          .finally(function () {
            busy = false;
            sendBtn.disabled = false;
            typingEl.classList.remove('show');
            input.focus();
          });
      });
    });
  </script>
</body>
</html>
